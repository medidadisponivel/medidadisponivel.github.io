<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 286 60" width="286" height="60" role="img" aria-label="Medida Disponível">
  <!--
    Logótipo Medida Disponível — versão para fundos CLAROS (navbar).
    Texto escuro + acentos de madeira. Para fundos escuros usar logo-light.svg.
  -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- braço do esquadro -->
    <path d="M12 11 V49 H50" stroke="#a9743f" stroke-width="3.4"/>
    <!-- marcas de medição na régua vertical -->
    <g stroke="#a9743f" stroke-width="2" opacity="0.95">
      <path d="M19 43 V49"/>
      <path d="M27 39 V49"/>
      <path d="M35 35 V49"/>
      <path d="M43 31 V49"/>
    </g>
    <!-- lâmina / diagonal de precisão -->
    <path d="M12 11 L50 49" stroke="#7d5226" stroke-width="2.2" opacity="0.9"/>
    <!-- apontamento no vértice -->
    <circle cx="12" cy="11" r="2.6" fill="#a9743f" stroke="none"/>
  </g>
  <text x="66" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="21" letter-spacing="0.4" fill="#3a2c1e" font-weight="bold">Medida</text>
  <text x="66" y="49" font-family="Georgia, 'Times New Roman', serif" font-size="21" letter-spacing="0.4" fill="#9c6a37">Disponível</text>
</svg>
